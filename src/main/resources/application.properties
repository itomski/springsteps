spring.mvc.view.prefix=/WEB-INF/
spring.mvc.view.suffix=.jsp

# Port: unter XAMPP 3306
spring.datasource.url=jdbc:mysql://localhost:8889/spring_products
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
# Password: Unter XAMPP ist nicht gesetzt
spring.datasource.password=root
# Steuert die Erzeugung/Veränderung der DB-Tabellen

# create: Erzeugt beim Start der Anwendung die Tabellen neu
# create-drop: Erzeugt beim Start der Anwendung die Tabellen neu. Löscht bei beenden der Anwendung die Tabellen
# update: Passt vorhandene Tabellen an, Löscht die Altdaten nicht
# none: Die Tabellen_Struktur wird nicht angefasst
# validate: Prüft, ob Änderungen erfolgen müssen, ändert die Tabellen aber NICHT
spring.jpa.hibernate.ddl-auto=update

db.reset.category=false
db.reset.user=true